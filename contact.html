<!DOCTYPE html>
<html>

<head>
    <title>Contact | Inclusive Baseball Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f5f5f5; color: #b11226; margin: 0; }
        nav { background-color: black; padding: 14px 22px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; box-shadow: 0 4px 14px rgba(0,0,0,0.25); position: sticky; top: 0; z-index: 1000; }
        nav img { height: 48px; width: auto; margin-right: 8px; }
        nav a { color: white; text-decoration: none; font-weight: 600; transition: color 0.3s ease, transform 0.3s ease; }
        nav a:hover { color: #ff4d4d; transform: translateY(-2px); }
        .container { max-width: 1050px; margin: auto; padding: 35px 20px; }
        .page-header { background: linear-gradient(to right, #111111, #2a2a2a); color: white; padding: 34px; border-radius: 16px; box-shadow: 0 12px 26px rgba(0,0,0,0.16); }
        .page-header h1 { margin: 0; color: white; }
        .card { border: 2px solid #b11226; padding: 24px; margin-top: 25px; background: linear-gradient(to bottom right, #ffffff, #f1f1f1); border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .card p, label { color: #333; line-height: 1.8; }
        input, textarea { width: 100%; max-width: 520px; padding: 12px; margin-top: 8px; margin-bottom: 16px; font-family: 'Poppins', sans-serif; border-radius: 10px; border: 1px solid #ccc; }
        .button { display: inline-block; background: linear-gradient(to right, #b11226, #d61f38); color: white; padding: 12px 20px; text-decoration: none; border-radius: 999px; border: none; font-weight: 700; cursor: pointer; }
        footer { text-align: center; padding: 22px; background-color: #111; color: white; margin-top: 45px; }
    </style>
</head>

<body>
    <nav>
        <img src="images/logo.png" alt="Inclusive Baseball Project logo">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="programs.html">Programs</a>
        <a href="getinvolved.html">Get Involved</a>
        <a href="donate.html">Donate</a>
        <a href="contact.html">Contact</a>
        <a href="resources.html">Resources</a>
        <a href="events.html">Events</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Contact</h1>
        </div>

        <div class="card">
            <p>Email: info@inclusivebaseball.org</p>
            <p>Phone: (903) 555-1234</p>
            <p>Location: Tyler, Texas</p>
        </div>

        <div class="card">
            <p>If you would like to learn more, support the mission, or ask a question, use the form below.</p>

            <form>
                <label>Name:</label>
                <input type="text" placeholder="Your name">


                <label>Email:</label>
                <input type="email" placeholder="Your email">


                <label>Message:</label>
                <textarea rows="5" placeholder="Your message"></textarea>

                <button class="button" type="button">Submit</button>
            </form>
        </div>
    </div>

    <footer>Inclusive Baseball Project</footer>
</body>
</html>
