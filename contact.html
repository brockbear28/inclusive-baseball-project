<!DOCTYPE html>
<html>

<head>
    <title>Contact | Inclusive Baseball Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: white;
            color: #b11226;
            margin: 0;
        }

        nav {
            background-color: black;
            padding: 14px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        .container {
            max-width: 950px;
            margin: auto;
            padding: 30px 20px;
        }

        .card {
            border: 2px solid #b11226;
            padding: 20px;
            margin-top: 25px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }

        .card p, label {
            color: #333;
            line-height: 1.6;
        }

        input, textarea {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .button {
            display: inline-block;
            background-color: #b11226;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="programs.html">Programs</a>
        <a href="getinvolved.html">Get Involved</a>
        <a href="donate.html">Donate</a>
        <a href="contact.html">Contact</a>
        <a href="resources.html">Resources</a>
        <a href="events.html">Events</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <div class="container">
        <img src="logo.png" alt="Inclusive Baseball Project logo" width="120">

        <h1>Contact</h1>

        <div class="card">
            <p>Email: info@inclusivebaseball.org</p>
            <p>Phone: (903) 555-1234</p>
            <p>Location: Tyler, Texas</p>
        </div>

        <div class="card">
            <p>If you would like to learn more, support the mission, or ask a question, use the form below.</p>

            <form>
                <label>Name:</label>
                <input type="text" placeholder="Your name">

                <label>Email:</label>
                <input type="email" placeholder="Your email">

                <label>Message:</label>
                <textarea rows="5" placeholder="Your message"></textarea>

                <br>
                <button class="button" type="button">Submit</button>
            </form>
        </div>
    </div>

    <footer>
        Inclusive Baseball Project
    </footer>

</body>
</html>
